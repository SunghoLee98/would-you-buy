spring:
  application:
    name: salae-malae-backend
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/salae_malae_db
    username: ${DB_USERNAME:daou}
    password: ${DB_PASSWORD:daou}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: SalaeMalaeHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        default_batch_fetch_size: 16
        jdbc:
          batch_size: 20
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 7070
  error:
    include-message: always
    include-binding-errors: always

jwt:
  secret: ${JWT_SECRET:mySecretKeyForDevelopmentOnlyPleaseChangeInProduction123456789}
  access-token-expiration: 3600000 # 1 hour in milliseconds
  refresh-token-expiration: 2592000000 # 30 days in milliseconds

logging:
  level:
    com.salaemalae: INFO
    org.springframework.security: INFO
    org.springframework.web: INFO
    # Development profile에서는 DEBUG 레벨 사용
    # 프로덕션에서는 INFO 레벨 권장
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-}] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-}] %logger{36} - %msg%n"
  file:
    name: ./logs/salae-malae-backend.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 10
      total-size-cap: 1GB
      file-name-pattern: ./logs/salae-malae-backend-%d{yyyy-MM-dd}.%i.log.gz

management:
  endpoints:
    web:
      exposure:
        # 필요한 엔드포인트만 노출 (프로덕션 환경 보안 강화)
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      # 인증된 사용자만 상세 정보 조회 가능
      show-details: when-authorized
      # 개발 환경에서는 always로 설정 가능
    prometheus:
      enabled: true
    info:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      service: salae-malae-backend
      environment: ${spring.profiles.active}