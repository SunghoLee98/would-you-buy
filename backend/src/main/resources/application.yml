spring:
  application:
    name: salae-malae-backend
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/salae_malae_db
    username: ${DB_USERNAME:daou}
    password: ${DB_PASSWORD:daou}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: SalaeMalaeHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        default_batch_fetch_size: 16
        jdbc:
          batch_size: 20
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 7070
  error:
    include-message: always
    include-binding-errors: always

jwt:
  secret: ${JWT_SECRET:mySecretKeyForDevelopmentOnlyPleaseChangeInProduction123456789}
  access-token-expiration: 3600000 # 1 hour in milliseconds
  refresh-token-expiration: 2592000000 # 30 days in milliseconds

logging:
  level:
    com.salaemalae: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always